name: Build from ZIP

on:
  push:
    paths:
      - 'CrossChatPlus.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip source
        run: |
          if [ -f CrossChatPlus.zip ]; then
            echo "Found CrossChatPlus.zip, extracting..."
            unzip -o CrossChatPlus.zip
            if [ -d CrossChatPlus ]; then
              rsync -a CrossChatPlus/ ./ --exclude=.github --exclude=.git
              rm -rf CrossChatPlus
            fi
            echo "Extraction complete."
          else
            echo "No CrossChatPlus.zip found, using existing sources."
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew 2>/dev/null || true
          if [ -f gradlew ]; then
            ./gradlew build
          else
            gradle build
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossChatPlus-jar
          path: build/libs/CrossChatPlus-*.jar
          retention-days: 7
