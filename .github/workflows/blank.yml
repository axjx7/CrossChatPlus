name: Build CrossChatPlus

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ------ 诊断阶段 ------
      - name: List root & extract if needed
        run: |
          echo "=== Files in root ==="
          ls -la
          if [ -f "CrossChatPlus.zip" ]; then
            echo "=== Contents of zip ==="
            unzip -l CrossChatPlus.zip | head -30
            echo "=== Extracting ==="
            unzip -q -o CrossChatPlus.zip
            echo "=== After extraction ==="
            ls -laR | head -40
          else
            echo "No CrossChatPlus.zip found. Checking other files..."
          fi
          echo "=== Searching for build.gradle ==="
          find . -name "build.gradle" -type f
          echo "=== Searching for gradlew ==="
          find . -name "gradlew" -type f

      # ------ 构建 ------
      - name: Build with Gradle
        run: |
          BD=$(find . -name "build.gradle" -exec dirname {} \; | head -1)
          if [ -z "$BD" ]; then
            echo "ERROR: build.gradle not found"
            exit 1
          fi
          echo "Build directory: $BD"
          cd "$BD"
          chmod +x gradlew 2>/dev/null || echo "No gradlew, will try gradle wrapper"
          if [ -f "gradlew" ]; then
            ./gradlew build
          else
            gradle build
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossChatPlus-jar
          path: |
            **/build/libs/CrossChatPlus-*.jar
          retention-days: 7
