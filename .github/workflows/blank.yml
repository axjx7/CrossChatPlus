name: Build CrossChatPlus

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # -------- 解压 + 诊断 --------
      - name: Extract and diagnose
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Extracting CrossChatPlus.zip ==="
          unzip -o CrossChatPlus.zip
          echo "=== After extract: first 40 lines of tree ==="
          find . -maxdepth 4 -type f | head -40
          echo "=== Searching for build.gradle ==="
          find . -name "build.gradle" -type f
          echo "=== Searching for gradlew ==="
          find . -name "gradlew" -type f

      # -------- 构建 --------
      - name: Build
        run: |
          BD=$(find . -name "build.gradle" -exec dirname {} \; | head -1)
          if [ -z "$BD" ]; then
            echo "ERROR: build.gradle not found!"
            exit 1
          fi
          echo "Build dir = $BD"
          cd "$BD"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "Running: ./gradlew build"
            ./gradlew build
          else
            echo "gradlew not found, trying with system gradle..."
            gradle build
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossChatPlus-jar
          path: "**/build/libs/*.jar"
          retention-days: 7
