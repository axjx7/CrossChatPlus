name: Build CrossChatPlus

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find build directory
        id: find-dir
        run: |
          pwd
          ls -laR | head -50   # 打印前50行目录结构
          BD=$(find . -name "build.gradle" -exec dirname {} \; | head -1)
          echo "BuildDir=$BD" >> "$GITHUB_OUTPUT"
          echo "Found: $BD"

      - name: Build with Gradle
        run: |
          cd "${{ steps.find-dir.outputs.BuildDir }}"
          ls -la
          chmod +x gradlew
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossChatPlus-jar
          path: |
            **/build/libs/CrossChatPlus-*.jar
          retention-days: 7
