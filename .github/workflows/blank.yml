name: Build CrossChatPlus

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CrossChatPlus.zip/CrossChatPlus  # ← 这里指定正确目录

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show directory structure
        run: find . -maxdepth 3 -name "*.gradle" -o -name "gradlew"

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossChatPlus-jar
          path: CrossChatPlus.zip/CrossChatPlus/build/libs/CrossChatPlus-*.jar
          retention-days: 7
